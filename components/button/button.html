<!-- ==========================================================================
     BUTTON COMPONENT — reference / demo snippet
     Usage: copy the variant you need into your page or component.
     ========================================================================== -->

<!-- Primary -->
<button class="btn btn--primary" type="button">Primary Button</button>

<!-- Secondary -->
<button class="btn btn--secondary" type="button">Secondary Button</button>

<!-- Outlined -->
<button class="btn btn--outline" type="button">Outline Button</button>

<!-- Ghost -->
<button class="btn btn--ghost" type="button">Ghost Button</button>

<!-- Destructive -->
<button class="btn btn--danger" type="button">Danger Button</button>

<!-- Sizes -->
<button class="btn btn--primary btn--sm"  type="button">Small</button>
<button class="btn btn--primary"          type="button">Default</button>
<button class="btn btn--primary btn--lg"  type="button">Large</button>

<!-- Full width -->
<button class="btn btn--primary btn--full" type="button">Full Width</button>

<!-- Disabled state -->
<button class="btn btn--primary" type="button" disabled>Disabled</button>

<!-- With icon (icon slot populated after design) -->
<button class="btn btn--primary btn--icon-left" type="button">
  <span class="btn__icon" aria-hidden="true">←</span>
  With Icon
</button>
