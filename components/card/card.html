<!-- ==========================================================================
     CARD COMPONENT — reference / demo snippet
     ========================================================================== -->

<!-- Default card -->
<article class="card">
  <div class="card__media">
    <img src="/assets/images/placeholder.jpg" alt="Card image description" class="card__image" />
  </div>
  <div class="card__body">
    <span class="card__label">Category</span>
    <h3 class="card__title">Card Title Goes Here</h3>
    <p class="card__description">
      Short description of the card content. Populated after design review.
    </p>
  </div>
  <div class="card__footer">
    <button class="btn btn--outline btn--sm" type="button">Read More</button>
  </div>
</article>

<!-- Horizontal card -->
<article class="card card--horizontal">
  <div class="card__media">
    <img src="/assets/images/placeholder.jpg" alt="" class="card__image" />
  </div>
  <div class="card__body">
    <h3 class="card__title">Horizontal Card</h3>
    <p class="card__description">Side-by-side layout for wider contexts.</p>
  </div>
</article>

<!-- Minimal / text-only card -->
<article class="card card--flat">
  <div class="card__body">
    <h3 class="card__title">Text Only Card</h3>
    <p class="card__description">No image, no shadow — just content.</p>
  </div>
</article>
